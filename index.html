<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            background: transparent !important;
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }

        #timer-wrapper {
            width: 100vw;
            min-height: 100vh;
            background: transparent;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
            position: relative;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0 4vw;
        }

        #countdown {
            font-size: clamp(1.8rem, 7.4vw, 8rem);
            font-weight: 900;
            letter-spacing: 0.35vw;
            /* Compensate for trailing letter-spacing so text is truly centered */
            padding-left: 0.35vw;
            text-align: center;
            text-shadow: 0 0 4px rgba(255,255,255,0.8);
            white-space: nowrap;
            width: 100%;
        }

        #timezone {
            font-size: clamp(0.6rem, 1.5vw, 0.85rem);
            opacity: 0.55;
            text-align: center;
            margin-top: 12px;
            width: 100%;
        }
    </style>
</head>
<body>
    <div id="timer-wrapper">
        <div id="countdown">Loading...</div>
        <div id="timezone"></div>
    </div>

    <script>
        const userTimeZone = Intl.DateTimeFormat().resolvedOptions().timeZone;
        document.getElementById("timezone").innerHTML = "Time Zone: " + userTimeZone;

        const targetDate = new Date(2026, 5, 13, 0, 0, 0).getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            if (distance <= 0) {
                document.getElementById("countdown").innerHTML = "000:00:00:00";
                clearInterval(timerInterval);
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("countdown").innerHTML =
                `${days.toString().padStart(3,'0')}:` +
                `${hours.toString().padStart(2,'0')}:` +
                `${minutes.toString().padStart(2,'0')}:` +
                `${seconds.toString().padStart(2,'0')}`;
        }

        const timerInterval = setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
