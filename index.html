<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        #timer-wrapper {
            width: 100%;
            height: 100vh;
            background: url('https://static1.squarespace.com/static/699f17b5bd0e3326382ea507/t/69a5e48a2ceb0019cc4964be/1772479627256/background.jpg') no-repeat center center/cover;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
            position: relative;
            color: white;
        }

        /* Dark overlay */
        #timer-wrapper::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.25);
            z-index: 0;
        }

        /* Orange / Red Glow Layer */
        #timer-wrapper::after {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            background:
                radial-gradient(
                    circle at center,
                    rgba(255, 80, 0, 0.35) 0%,
                    rgba(255, 40, 0, 0.25) 30%,
                    rgba(255, 0, 0, 0.15) 55%,
                    transparent 75%
                );
            mix-blend-mode: screen;
            animation: backgroundGlow 6s ease-in-out infinite;
            z-index: 0;
        }

        @keyframes backgroundGlow {
            0%   { opacity: 0.6; transform: scale(1); }
            50%  { opacity: 1; transform: scale(1.05); }
            100% { opacity: 0.6; transform: scale(1); }
        }

        .blur-mask {
            position: absolute;
            top: 43%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 58%;
            height: 13%;
            backdrop-filter: blur(20px);
            background: rgba(0,0,0,0.15);
            z-index: 1;
        }

        #countdown {
            position: absolute;
            top: 43%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 7.4vw;
            font-weight: 900;
            letter-spacing: 0.35vw;
            z-index: 2;
            text-shadow: 0 0 4px rgba(255,255,255,0.8);
        }

        #timezone {
            position: absolute;
            bottom: 18px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.75rem;
            opacity: 0.55;
            z-index: 2;
        }
    </style>
</head>
<body>
    <div id="timer-wrapper">
        <div class="blur-mask"></div>
        <div id="countdown">Loading...</div>
        <div id="timezone"></div>
    </div>

    <script>
        const userTimeZone = Intl.DateTimeFormat().resolvedOptions().timeZone;
        document.getElementById("timezone").innerHTML = "Time Zone: " + userTimeZone;

        const targetDate = new Date(2026, 5, 13, 0, 0, 0).getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            if (distance <= 0) {
                document.getElementById("countdown").innerHTML = "000:00:00:00";
                clearInterval(timerInterval);
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("countdown").innerHTML =
                `${days.toString().padStart(3,'0')}:` +
                `${hours.toString().padStart(2,'0')}:` +
                `${minutes.toString().padStart(2,'0')}:` +
                `${seconds.toString().padStart(2,'0')}`;
        }

        const timerInterval = setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
