<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            background: transparent !important;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        #timer-wrapper {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            /* Nudge up to compensate for Squarespace nav bar */
            padding-bottom: 15vh;
        }

        #countdown {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1rem, 3vw, 3.2rem);
            font-weight: 900;
            letter-spacing: 0.3vw;
            text-align: center;
            text-shadow: 0 0 4px rgba(255,255,255,0.8);
            white-space: nowrap;
            color: white;
        }

        #timezone {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(0.65rem, 1.5vw, 0.9rem);
            color: white;
            opacity: 0.55;
            text-align: center;
            margin-top: 12px;
        }
    </style>
</head>
<body>
    <div id="timer-wrapper">
        <div id="countdown">Loading...</div>
        <div id="timezone"></div>
    </div>
    <script>
        document.getElementById("timezone").textContent =
            "Time Zone: " + Intl.DateTimeFormat().resolvedOptions().timeZone;

        const targetDate = new Date(2026, 5, 13, 0, 0, 0).getTime();

        function updateCountdown() {
            const distance = targetDate - Date.now();
            if (distance <= 0) {
                document.getElementById("countdown").textContent = "000:00:00:00";
                clearInterval(timerInterval);
                return;
            }
            const d = Math.floor(distance / 86400000);
            const h = Math.floor((distance % 86400000) / 3600000);
            const m = Math.floor((distance % 3600000) / 60000);
            const s = Math.floor((distance % 60000) / 1000);
            document.getElementById("countdown").textContent =
                `${String(d).padStart(3,'0')}:${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        }

        const timerInterval = setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
